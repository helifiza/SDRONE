<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="classify.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

    <title>SDrone - Detection</title>
</head>

<body>
    <header class="tool_bar">
        <div class="logo">
            <img src="logo.png" alt="SDrone Logo" class="logo_img">
            <span>SDrone</span>
        </div>

        <nav class="nav_link">
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="classify.html" class="active">Detection</a></li>
                <li><a href="#">High Mode</a></li>
                <li><a href="#">News</a></li>
            </ul>
        </nav>

        <div class="contact_us">
            <a href="#" class="btn-contact">Contact us</a>
        </div>
    </header>

    <main class="main_detect">
        <section class="detect_banner">
            <div class="drone_card">
                <img src="drone_.png" alt="Drone" class="bg_detect">
            </div>
        </section>

        <section class="upload_area">
            <h1>Hãy upload file vào đây</h1>

            <label class="drop_box">
                <input type="file" hidden>
                <i class='bx bx-cloud-upload'></i>
            </label>

            <button class="upload_btn">Upload</button>
        </section>
    </main>
</body>
</html>
